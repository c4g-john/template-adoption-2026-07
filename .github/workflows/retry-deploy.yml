name: deploy retry

# A job inside a failing run cannot rerun its own run (GitHub refuses with
# "already running") — that was the old retry-on-flake job, which failed by
# design on every firing. This follower runs after the dashboard run
# completes, retries the first failure, and lets a second failure stay red
# for a human.
on:
  workflow_run:
    workflows: ["status dashboard"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: gh run rerun "$RUN_ID" --repo "$GITHUB_REPOSITORY" --failed
