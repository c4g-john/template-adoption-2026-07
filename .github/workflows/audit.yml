name: docassert audit

# The gate: validates changed documents and checks cross-document consistency
# on every pull request. Also runs on pushes to main so the badge stays honest.
# Make it binding with branch protection requiring `audit` + `consistency`.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # lets the action post results as a PR comment

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # changed-only diffs against the PR base
      - name: Pass the advisory key only when documents changed
        id: docs
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "$PR" ]; then
            files=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR/files" --paginate -q '.[].filename')
          else
            files=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git show --name-only --format= HEAD)
          fi
          changed=false
          if echo "$files" | grep -Eq '^(documents/|consistency\.yaml)'; then
            changed=true
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - uses: c4g-john/docassert-action@v1
        with:
          command: validate
          changed-only: 'true'
          anthropic-api-key: ${{ steps.docs.outputs.changed == 'true' && secrets.ANTHROPIC_API_KEY || '' }}   # optional

  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2   # push-event diff against the previous commit
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .docassert-cache
          key: docassert-advisory-${{ github.run_id }}
          restore-keys: |
            docassert-advisory-
      - name: Pass the advisory key only when documents changed
        id: docs
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "$PR" ]; then
            files=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR/files" --paginate -q '.[].filename')
          else
            files=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git show --name-only --format= HEAD)
          fi
          changed=false
          if echo "$files" | grep -Eq '^(documents/|consistency\.yaml)'; then
            changed=true
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - uses: c4g-john/docassert-action@v1
        with:
          command: consistency
          anthropic-api-key: ${{ steps.docs.outputs.changed == 'true' && secrets.ANTHROPIC_API_KEY || '' }}   # optional

  skill-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: c4g-john/docassert-action/install@v1
      - name: Skill is current with docassert
        run: |
          python - <<'PY'
          import filecmp, sys
          from importlib.resources import files
          pkg = files("docassert") / "_data/skills/doc-to-pmo/SKILL.md"
          if not filecmp.cmp(str(pkg), ".claude/skills/doc-to-pmo/SKILL.md", shallow=False):
              sys.exit("::error::.claude/skills/doc-to-pmo drifted from docassert; run `docassert init`.")
          print("skill matches the packaged version")
          PY
