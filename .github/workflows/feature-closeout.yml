name: feature close-out

# When a Story closes, close its parent Feature once every sibling is closed.
#
# Level-triggered: each run reconciles EVERY open parent, not just the event's
# parent. Simultaneous close events share one concurrency slot and GitHub
# keeps only one queued run (observed 2026-07-05: one squash-merge closed four
# stories, two of the four runs were cancelled, and two features stayed open),
# so any surviving run must be able to do the whole job. Passes repeat so a
# closed feature can close its own parent in the same run.
on:
  issues:
    types: [closed]
  workflow_dispatch:

concurrency:
  group: feature-closeout
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  closeout:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Close every open parent whose sub-issues are all closed
        env:
          GH_TOKEN: ${{ github.token }}
          QUERY: |
            query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                issues(states: OPEN, first: 100) {
                  nodes {
                    number
                    subIssues(first: 100) { totalCount nodes { state } }
                  }
                }
              }
            }
        run: |
          for pass in 1 2 3; do
            parents=$(gh api graphql -f query="$QUERY" \
              -f owner="${GITHUB_REPOSITORY%/*}" -f repo="${GITHUB_REPOSITORY#*/}" \
              -q '.data.repository.issues.nodes[]
                  | select(.subIssues.totalCount > 0)
                  | select([.subIssues.nodes[] | select(.state != "CLOSED")] | length == 0)
                  | .number')
            if [ -z "$parents" ]; then
              echo "pass $pass: nothing left to close"
              exit 0
            fi
            for number in $parents; do
              gh issue close "$number" --repo "$GITHUB_REPOSITORY" \
                --comment "All stories under this feature are closed; closing per the bridge."
            done
          done
